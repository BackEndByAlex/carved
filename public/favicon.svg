<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#0a0805" rx="4"/>

  <!-- A shape — cave arch -->
  <path d="M7 26 L16 5 L25 26" fill="none" stroke="#c8741a" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Crossbar — circuit trace -->
  <line x1="11.5" y1="19" x2="20.5" y2="19" stroke="#c8741a" stroke-width="2"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Circuit nodes — cyan -->
  <circle cx="11.5" cy="19" r="1.8" fill="#5fd9ff" filter="url(#glow)"/>
  <circle cx="20.5" cy="19" r="1.8" fill="#5fd9ff" filter="url(#glow)"/>
</svg>
